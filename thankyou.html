<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - ModuForge 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --black: #0A0A0A;
      --card-bg: #141414;
      --surface: #1E1E1E;
      --border: #2A2A2A;
      --grey: #888;
      --light: #F0F0F0;
      --white: #FFFFFF;
      --blue: #00AAFF;
      --blue-glow: rgba(0,170,255,0.35);
    }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--black);
      color: var(--light);
      font-family: 'Inter', sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(640px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 40px 28px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.04em;
      color: var(--white);
    }
    p {
      margin: 0 0 24px;
      color: var(--grey);
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 4px;
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--black);
      background: linear-gradient(180deg, #00b7ff, #009be0);
      border: 1px solid rgba(0, 170, 255, 0.85);
      box-shadow: 0 0 0 1px rgba(0, 170, 255, 0.08);
    }
    a:hover {
      box-shadow: 0 0 16px var(--blue-glow);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Thank You</h1>
    <p>Your order has been submitted successfully. We’ll be in touch with the next steps shortly.</p>
    <a href="index.html">Back to Home</a>
  </main>
</body>
</html>
